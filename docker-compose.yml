version: '3.8'

services:
  mysql:
    image: jaswanth746/ciniplus-db:latest
    container_name: ciniplus_mysql
    environment:
      MYSQL_ROOT_PASSWORD: my_secret_root_password
      MYSQL_DATABASE: cini_plus
      MYSQL_USER: jaswanth
      MYSQL_PASSWORD: jaswanth_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmy_secret_root_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: jaswanth746/ciniplus-backend:latest
    container_name: ciniplus_backend
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=jaswanth
      - DB_PASSWORD=jaswanth_password
      - DB_NAME=cini_plus
      - DB_SOCKET=
      - JWT_SECRET=super_secret_change_this
      - JWT_EXPIRES_IN=1d
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: jaswanth746/ciniplus-frontend:latest
    container_name: ciniplus_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
